<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Meri Jaan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fff3ec; --blush:#f7d9e3; --rose:#e8a2b4; --deep-plum:#5b3350;
    --lavender:#c9b6e4; --gold:#e8b96a; --amber:#e8956f; --ink:#4a2f42;
    --shadow-rose: rgba(232,162,180,.45);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ margin:0; padding:0; height:100%; width:100%; font-family:'Quicksand', sans-serif; color:var(--ink); background:var(--cream); overflow:hidden; -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #app{position:fixed; inset:0; width:100vw; height:100vh; overflow:hidden;}
  #app.hug-shake{ animation: hugShake .7s ease; }
  @keyframes hugShake{ 0%,100%{ transform:translate(0,0);} 20%{transform:translate(-6px,2px);} 40%{transform:translate(6px,-2px);} 60%{transform:translate(-4px,3px);} 80%{transform:translate(4px,-3px);} }

  .bg-glow{ position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse 60% 45% at var(--gx,15%) var(--gy,10%), rgba(201,182,228,.35), transparent 60%),
      radial-gradient(ellipse 55% 50% at 90% 85%, rgba(232,185,106,.28), transparent 60%),
      radial-gradient(ellipse 70% 60% at 50% 100%, rgba(232,162,180,.35), transparent 65%),
      linear-gradient(180deg, #fff8f2 0%, #fff3ec 55%, #fbe7ee 100%); }

  .heart-field{position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden;}
  .float-heart{ position:absolute; bottom:-40px; opacity:.55; color:var(--rose); animation-name:floatUp; animation-timing-function:linear; animation-iteration-count:1; filter:drop-shadow(0 2px 6px rgba(232,162,180,.4)); }
  @keyframes floatUp{ 0%{transform:translateY(0) translateX(0) rotate(0deg); opacity:0;} 10%{opacity:.6;} 90%{opacity:.5;} 100%{transform:translateY(-115vh) translateX(20px) rotate(25deg); opacity:0;} }

  .twinkle{ position:absolute; color:var(--gold); opacity:0; pointer-events:none; animation-name:twinkleAnim; animation-timing-function:ease-in-out; animation-iteration-count:1; }
  @keyframes twinkleAnim{ 0%{opacity:0; transform:scale(.4) rotate(0deg);} 50%{opacity:.9; transform:scale(1) rotate(90deg);} 100%{opacity:0; transform:scale(.4) rotate(180deg);} }

  .click-heart{ position:fixed; z-index:60; pointer-events:none; color:var(--rose); font-size:18px; animation: clickPop .9s ease-out forwards; }
  @keyframes clickPop{ 0%{transform:translate(-50%,-50%) scale(.4); opacity:1;} 100%{transform:translate(-50%, calc(-50% - 60px)) scale(1.2); opacity:0;} }

  .pages{position:relative; z-index:2; width:100%; height:100%;}
  .page{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:5vh 6vw 12vh; opacity:0; visibility:hidden; transform:translateX(40px) scale(.98); transition:opacity .7s ease, transform .7s ease, visibility .7s; overflow-y:auto; }
  .page.active{ opacity:1; visibility:visible; transform:translateX(0) scale(1); }

  .nav-dots{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:20; display:flex; gap:10px; align-items:center; background:rgba(255,255,255,.6); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); padding:10px 16px; border-radius:40px; box-shadow:0 8px 24px rgba(91,51,80,.12); }
  .dot{ width:9px; height:9px; border-radius:50%; background:rgba(91,51,80,.25); border:none; cursor:pointer; transition:all .35s ease; padding:0;}
  .dot.active{ background:var(--rose); width:26px; border-radius:6px;}
  .dot:hover{ background:var(--gold); }

  .arrow-nav{ position:fixed; top:50%; transform:translateY(-50%); z-index:20; background:rgba(255,255,255,.6); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border:none; width:46px; height:46px; border-radius:50%; font-size:20px; color:var(--deep-plum); cursor:pointer; box-shadow:0 8px 20px rgba(91,51,80,.12); display:flex; align-items:center; justify-content:center; transition:transform .25s ease, background .25s ease, color .25s ease, opacity .25s ease; }
  .arrow-nav:hover{ background:var(--rose); color:#fff; transform:translateY(-50%) scale(1.08); }
  #prevBtn{left:14px;} #nextBtn{right:14px;}
  .arrow-nav:disabled{opacity:0; pointer-events:none;}

  h1,h2,h3{ font-family:'Cormorant Garamond', serif; font-weight:600; margin:0;}

  /* ===== PAGE 1: LETTER ===== */
  .letter-scene{ width:100%; max-width:660px; display:flex; flex-direction:column; align-items:center; gap:20px; margin:auto; }
  .envelope-wrap{ cursor:pointer; }
  .envelope{ position:relative; width:280px; height:190px; perspective:1000px; transition:transform .6s ease, opacity .6s ease; animation:envIdle 3.4s ease-in-out infinite; }
  @keyframes envIdle{ 0%,100%{ transform:translateY(0) rotate(0deg);} 50%{ transform:translateY(-6px) rotate(-1deg);} }
  .envelope.open{ animation:none; }
  .envelope.hidden{ opacity:0; transform:scale(.8) translateY(-30px); pointer-events:none; position:absolute;}
  .env-body{ position:absolute; inset:0; background:linear-gradient(160deg, var(--rose), var(--blush)); border-radius:8px; box-shadow:0 25px 50px -12px var(--shadow-rose), 0 0 0 1px rgba(255,255,255,.4) inset; }
  .env-flap{ position:absolute; top:0; left:0; width:100%; height:95px; background:var(--rose); filter:brightness(1.08); clip-path:polygon(0 0, 100% 0, 50% 90%); transform-origin:top center; transform-style:preserve-3d; transition:transform .8s cubic-bezier(.6,-0.28,.74,.05); z-index:3; }
  .envelope.open .env-flap{ transform:rotateX(180deg); }
  .env-seal{ position:absolute; top:66px; left:50%; transform:translate(-50%,0); width:46px; height:46px; border-radius:50%; background:radial-gradient(circle at 35% 30%, var(--gold), #c9922f); box-shadow:0 4px 10px rgba(0,0,0,.2); display:flex; align-items:center; justify-content:center; color:#fff8ec; font-size:20px; z-index:4; transition:opacity .3s ease, transform .3s ease, box-shadow .3s ease; }
  .env-seal:hover{ box-shadow:0 4px 16px rgba(0,0,0,.3); }
  .envelope.open .env-seal{ opacity:0; transform:translate(-50%,0) scale(.4);}
  .env-hint{ position:absolute; bottom:-34px; left:50%; transform:translateX(-50%); font-size:14px; color:var(--deep-plum); opacity:.65; white-space:nowrap; animation:pulseHint 2s ease-in-out infinite; }
  @keyframes pulseHint{ 0%,100%{opacity:.45;} 50%{opacity:.85;} }
  .seal-tip{ position:absolute; top:-38px; left:50%; transform:translateX(-50%) scale(.8); background:var(--deep-plum); color:#fff8ec; font-size:11px; padding:5px 10px; border-radius:10px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; }
  .env-seal:hover .seal-tip{ opacity:1; transform:translateX(-50%) scale(1); }

  .letter-paper{ width:min(560px,90vw); background:#fffdf9; border-radius:6px; padding:42px 38px 34px; box-shadow:0 30px 60px -15px rgba(91,51,80,.35); position:relative; opacity:0; transform:translateY(30px) scale(.96); transition:opacity .7s ease, transform .7s ease; max-height:50vh; overflow-y:auto; cursor:pointer; }
  .letter-paper.show{ opacity:1; transform:translateY(0) scale(1); }
  .letter-paper::before{ content:''; position:absolute; top:0; left:0; right:0; height:6px; background:linear-gradient(90deg, var(--rose), var(--gold), var(--lavender)); border-radius:6px 6px 0 0; }
  .letter-heading{ font-family:'Caveat', cursive; font-size:34px; color:var(--rose); margin-bottom:6px; }
  .letter-text{ font-family:'Cormorant Garamond', serif; font-size:20px; line-height:1.75; color:var(--ink); white-space:pre-wrap; }
  .letter-text .typed-cursor{ animation:blink 1s step-end infinite; }
  @keyframes blink{ 50%{opacity:0;} }
  .letter-sign{ font-family:'Caveat', cursive; font-size:28px; color:var(--rose); margin-top:18px; text-align:right; }
  .letter-skip-hint{ font-size:12px; color:var(--deep-plum); opacity:.5; text-align:center; margin-top:-8px; }

  .promise-wrap{ width:100%; max-width:560px; display:flex; flex-direction:column; align-items:center; gap:12px; opacity:0; max-height:0; overflow:hidden; transition:opacity .6s ease, max-height .6s ease, margin .6s ease; }
  .promise-wrap.show{ opacity:1; max-height:400px; margin-top:2px; }
  .promise-title{ font-size:14px; color:var(--deep-plum); opacity:.75; text-align:center; }
  .promise-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; width:100%; }
  .promise-card{ background:rgba(255,255,255,.6); border:1px solid rgba(232,162,180,.35); border-radius:14px; padding:14px 6px; text-align:center; cursor:pointer; transition:transform .15s ease, background .3s ease, box-shadow .3s ease; }
  .promise-card:hover, .promise-card.tapped{ background:#fff; box-shadow:0 14px 26px -10px rgba(232,162,180,.5); }
  .promise-emoji{ font-size:24px; display:block; margin-bottom:5px; transition:transform .4s ease; }
  .promise-card.tapped .promise-emoji{ transform:scale(1.25) rotate(-6deg); }
  .promise-msg{ font-size:11.5px; color:var(--ink); opacity:0; max-height:0; overflow:hidden; transition:opacity .35s ease, max-height .35s ease, margin .35s ease; }
  .promise-card.tapped .promise-msg{ opacity:.85; max-height:60px; margin-top:5px; }

  .continue-btn{ font-family:'Quicksand'; font-weight:600; font-size:15px; letter-spacing:.02em; background:var(--deep-plum); color:#fff8ec; border:none; padding:13px 30px; border-radius:30px; cursor:pointer; box-shadow:0 12px 24px -8px rgba(91,51,80,.5); opacity:0; transform:translateY(10px); pointer-events:none; transition:all .5s ease; }
  .continue-btn.show{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .continue-btn:hover{ background:var(--rose); }

  /* ===== PAGE 2: KETTLE & MUG ===== */
  .kettle-scene{ width:100%; max-width:600px; display:flex; flex-direction:column; align-items:center; gap:16px; margin:auto; }
  .kettle-title{ text-align:center; }
  .kettle-title h2{ font-size:30px; color:var(--deep-plum); }
  .kettle-title p{ font-size:13.5px; color:var(--ink); opacity:.7; margin-top:4px;}

  .brew-zone{ display:flex; align-items:flex-end; justify-content:center; gap:26px; position:relative; height:180px; width:100%; }
  .kettle-wrap{ cursor:pointer; font-size:60px; line-height:1; transform-origin:80% 90%; transition:transform .35s ease; user-select:none; position:relative; }
  .kettle-wrap.pour{ animation:pourTilt .6s ease; }
  @keyframes pourTilt{ 0%,100%{transform:rotate(0deg);} 40%{transform:rotate(-28deg);} }
  .pour-drop{ position:absolute; font-size:16px; opacity:0; left:110px; top:36px; }
  .pour-drop.drop{ animation:dropFall .55s ease-in forwards; }
  @keyframes dropFall{ 0%{opacity:1; transform:translate(0,0);} 100%{opacity:0; transform:translate(30px,70px);} }

  .mug-wrap{ position:relative; width:86px; height:96px; }
  .mug{ position:relative; width:100%; height:100%; border-radius:0 0 16px 16px; border:4px solid var(--deep-plum); border-top:none; background:#fff; overflow:hidden; }
  .mug-liquid{ position:absolute; bottom:0; left:0; width:100%; height:0%; background:linear-gradient(180deg,#cfd9e0,#b9c6ce); transition:height .5s ease, background 1s ease; }
  .sugar-cube{ position:absolute; bottom:2px; width:9px; height:9px; background:#fff; border:1px solid #e0c98f; border-radius:2px; opacity:0; transform:translateY(-14px) scale(.4); transition:opacity .4s ease, transform .4s ease; }
  .sugar-cube.show{ opacity:1; transform:translateY(0) scale(1); }
  .mug-handle{ position:absolute; right:-16px; top:22px; width:22px; height:34px; border:4px solid var(--deep-plum); border-left:none; border-radius:0 14px 14px 0; }
  .mug-steam-wrap{ position:absolute; top:-26px; left:50%; transform:translateX(-50%); width:60px; height:60px; overflow:visible; }
  .steam2{ position:absolute; bottom:0; left:12px; width:5px; height:22px; border-radius:6px; background:rgba(255,255,255,.75); opacity:0; filter:blur(1.5px); }
  .steam2:nth-child(2){ left:30px; }
  .mug-steam-wrap.on .steam2{ animation-name:steamRise2; animation-duration:2s; animation-timing-function:ease-in; animation-iteration-count:infinite; }
  .mug-steam-wrap.on .steam2:nth-child(2){ animation-delay:.6s; }
  @keyframes steamRise2{ 0%{opacity:0; transform:translateY(0) scaleY(.6);} 30%{opacity:.8;} 100%{opacity:0; transform:translateY(-40px) scaleY(1.3);} }
  .steam-word{ position:absolute; bottom:6px; left:20px; font-family:'Caveat', cursive; font-size:15px; color:var(--rose); opacity:0; white-space:nowrap; animation:steamWordFloat 2.6s ease-out forwards; }
  @keyframes steamWordFloat{ 0%{opacity:0; transform:translateY(0) scale(.7);} 20%{opacity:.9; transform:translateY(-10px) scale(1);} 100%{opacity:0; transform:translateY(-55px) scale(1.05);} }

  .warmth-caption{ font-size:13.5px; color:var(--deep-plum); opacity:.8; text-align:center; min-height:20px; }
  .warmth-track{ width:min(320px,80vw); height:12px; background:rgba(91,51,80,.12); border-radius:10px; overflow:hidden; }
  .warmth-fill{ height:100%; width:0%; border-radius:10px; background:linear-gradient(90deg,#9fb4c2,var(--amber),var(--gold)); transition:width .5s ease; }

  .sugar-zone{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .sugar-bowl{ font-size:32px; cursor:pointer; transition:transform .2s ease; user-select:none; }
  .sugar-bowl:active{ transform:scale(.88); }
  .sugar-caption{ font-size:12.5px; color:var(--deep-plum); opacity:.75; text-align:center; min-height:16px; }

  .joke-card{ width:100%; max-width:500px; background:#fffdf9; border-radius:18px; padding:0 26px; box-shadow:0 20px 40px -14px rgba(91,51,80,.3); text-align:center; opacity:0; transform:translateY(16px) scale(.97); max-height:0; overflow:hidden; transition:opacity .6s ease, transform .6s ease, max-height .6s ease, padding .6s ease, margin .6s ease; }
  .joke-card.show{ opacity:1; transform:translateY(0) scale(1); max-height:600px; padding:22px 26px; margin-top:2px; }
  .joke-card p{ font-family:'Cormorant Garamond', serif; font-size:18px; line-height:1.65; margin:0 0 8px; }
  .joke-card .note{ color:var(--rose); font-family:'Caveat', cursive; font-size:21px; margin-top:6px; }

  /* ===== PAGE 3: WHEEL + HUG + GAME ===== */
  .playful-scene{ width:100%; max-width:660px; display:flex; flex-direction:column; align-items:center; gap:26px; margin:auto; }
  .playful-title{ text-align:center; }
  .playful-title h2{ font-size:30px; color:var(--deep-plum); }
  .playful-title p{ font-size:13.5px; color:var(--ink); opacity:.7; margin-top:4px;}

  .wheel-zone{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .wheel-outer{ position:relative; width:220px; height:220px; }
  .wheel-pointer{ position:absolute; top:-14px; left:50%; transform:translateX(-50%); font-size:22px; color:var(--deep-plum); z-index:5; filter:drop-shadow(0 3px 4px rgba(0,0,0,.2)); }
  .wheel{ width:100%; height:100%; border-radius:50%; position:relative; box-shadow:0 20px 40px -10px rgba(91,51,80,.4), 0 0 0 8px #fffdf9, 0 0 0 10px var(--deep-plum); transition:transform 3.6s cubic-bezier(.15,.7,.2,1); }
  .wheel-label{ position:absolute; top:50%; left:50%; transform-origin:0 0; font-size:11px; font-weight:700; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.35); width:88px; text-align:center; }
  .wheel-center{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:32px; height:32px; border-radius:50%; background:#fffdf9; box-shadow:0 4px 10px rgba(0,0,0,.2); display:flex; align-items:center; justify-content:center; font-size:15px; z-index:4; }

  .spin-btn{ font-family:'Quicksand'; font-weight:700; font-size:14.5px; background:var(--deep-plum); color:#fff8ec; border:none; padding:12px 30px; border-radius:30px; cursor:pointer; box-shadow:0 12px 24px -8px rgba(91,51,80,.5); transition:all .25s ease; }
  .spin-btn:hover{ background:var(--rose); }
  .spin-btn:disabled{ opacity:.55; cursor:default; }
  .wheel-result{ font-family:'Cormorant Garamond', serif; font-size:18px; font-style:italic; color:var(--deep-plum); text-align:center; opacity:0; transform:translateY(8px); transition:opacity .5s ease, transform .5s ease; max-width:400px; min-height:24px; }
  .wheel-result.show{ opacity:1; transform:translateY(0); }

  .hug-zone{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .hug-btn{ font-family:'Quicksand'; font-weight:700; font-size:14.5px; background:linear-gradient(135deg,var(--rose),var(--gold)); color:#fff; border:none; padding:13px 28px; border-radius:30px; cursor:pointer; box-shadow:0 14px 26px -8px rgba(232,162,180,.6); transition:transform .2s ease; }
  .hug-btn:hover{ transform:scale(1.05); }
  .hug-btn:active{ transform:scale(.94); }
  .hug-caption{ font-size:13.5px; color:var(--deep-plum); opacity:.85; min-height:18px; text-align:center; }

  .game-zone{ width:100%; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .game-title{ font-size:14px; color:var(--deep-plum); opacity:.8; text-align:center; }
  .game-box{ position:relative; width:100%; max-width:420px; height:200px; background:rgba(255,255,255,.5); border:1.5px dashed rgba(232,162,180,.5); border-radius:18px; overflow:hidden; cursor:none; }
  .game-heart{ position:absolute; top:-26px; font-size:20px; transform:translate(-50%,0); user-select:none; }
  .basket{ position:absolute; bottom:4px; font-size:32px; transform:translate(-50%,0); user-select:none; filter:drop-shadow(0 4px 6px rgba(0,0,0,.15)); }
  .game-hud{ display:flex; gap:18px; align-items:center; font-size:13px; color:var(--deep-plum); font-weight:600; }
  .game-start-btn{ font-family:'Quicksand'; font-weight:700; font-size:14px; background:var(--deep-plum); color:#fff8ec; border:none; padding:11px 26px; border-radius:24px; cursor:pointer; box-shadow:0 10px 20px -8px rgba(91,51,80,.5); transition:background .25s ease; }
  .game-start-btn:hover{ background:var(--rose); }
  .game-end-msg{ font-family:'Cormorant Garamond', serif; font-size:17px; font-style:italic; color:var(--deep-plum); text-align:center; opacity:0; max-height:0; overflow:hidden; transition:opacity .5s ease, max-height .5s ease; max-width:420px; }
  .game-end-msg.show{ opacity:1; max-height:100px; }
  .plus-one{ position:absolute; font-family:'Caveat', cursive; font-size:20px; color:var(--rose); font-weight:700; pointer-events:none; animation:plusFloat 0.8s ease-out forwards; }
  @keyframes plusFloat{ 0%{opacity:1; transform:translateY(0);} 100%{opacity:0; transform:translateY(-30px);} }

  .confetti-piece{ position:fixed; top:-20px; z-index:55; pointer-events:none; border-radius:2px; opacity:.9; animation-name:confettiFall; animation-timing-function:linear; animation-fill-mode:forwards; }
  @keyframes confettiFall{ to{transform:translateY(115vh) rotate(540deg); opacity:0;} }

  @media (max-width:640px){
    .promise-grid{ grid-template-columns:repeat(2,1fr); }
    .letter-paper{ padding:26px 20px; max-height:42vh;}
    .letter-text{ font-size:17px; }
    .arrow-nav{ width:38px; height:38px; font-size:16px;}
    .page{ padding:4vh 5vw 14vh; }
    .wheel-outer{ width:190px; height:190px; }
  }
  @media (prefers-reduced-motion: reduce){ *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; } }
</style>
</head>
<body>
<div id="app">
  <div class="bg-glow" id="bgGlow"></div>
  <div class="heart-field" id="heartField"></div>

  <button class="arrow-nav" id="prevBtn" aria-label="Previous page">&#8592;</button>
  <button class="arrow-nav" id="nextBtn" aria-label="Next page">&#8594;</button>

  <div class="pages">
    <!-- PAGE 1: LETTER -->
    <section class="page active" id="page1">
      <div class="letter-scene">
        <div class="envelope-wrap" id="envelopeWrap">
          <div class="envelo
